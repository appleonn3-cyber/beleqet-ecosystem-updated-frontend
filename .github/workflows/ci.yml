name: CI

# Validates every pull request and push to main across all three applications,
# builds and smoke-tests the production Docker images, and (on push to main
# only) publishes SHA-tagged images to GHCR for the staging deploy workflow.

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ── Repository, workflow, and script validation ────────────────────────────
  repo-validation:
    name: Repo & workflow validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint GitHub Actions workflows (actionlint)
        run: >-
          docker run --rm -v "$PWD:/repo" --workdir /repo
          rhysd/actionlint:1.7.7 -color

      - name: Lint shell scripts (shellcheck)
        run: shellcheck scripts/ci/*.sh scripts/deploy/*.sh

      - name: Lint Dockerfiles (hadolint, fail on errors)
        run: |
          for df in Dockerfile frontend/Dockerfile beleqet-jobs-nextjs/Dockerfile; do
            echo "hadolint: $df"
            docker run --rm -i hadolint/hadolint:v2.12.0 \
              hadolint --failure-threshold error - < "$df"
          done

      - name: Validate all Compose files render
        run: bash scripts/ci/verify-compose.sh

      - name: Scan working tree for secrets (gitleaks)
        run: >-
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.21.2
          detect --source /repo --no-git --redact --no-banner

  # ── Backend static quality ─────────────────────────────────────────────────
  backend-quality:
    name: Backend lint, format, types, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - name: ESLint (non-mutating)
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: TypeScript validation (src, test, tools)
        run: npx tsc --noEmit
      - name: NestJS production build
        run: npm run build

  # ── Backend unit tests + CI/CD helper tests ────────────────────────────────
  backend-unit:
    name: Backend unit tests & coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beleqet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Create synthetic test environment
        run: bash scripts/ci/create-test-env.sh .env
      - run: npm run prisma:generate
      - name: Apply database migrations
        run: npm run prisma:migrate:deploy
      - name: Jest unit tests
        run: npm test
      - name: Jest coverage
        run: npm run test:cov
      - name: CI/CD helper tests (unit + integration)
        run: npm run test:ci-cd

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: coverage/lcov-report/
          retention-days: 7
          if-no-files-found: ignore

  # ── Backend integration, NestJS E2E, and API smoke tests ───────────────────
  backend-integration:
    name: Backend integration & E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beleqet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Create synthetic test environment
        run: bash scripts/ci/create-test-env.sh .env
      - run: npm run prisma:generate
      - name: Apply database migrations
        run: npm run prisma:migrate:deploy
      - run: npm run build

      - name: Module integration tests
        run: npx jest --testPathPattern "integration\.spec\.ts$" --runInBand

      - name: NestJS E2E tests
        run: npm run test:e2e -- --runInBand

      - name: Boot backend and run API health smoke tests
        run: |
          node dist/main &
          BACKEND_PID=$!
          bash scripts/deploy/health-check.sh http://127.0.0.1:4000/api/v1/health 30 2
          bash scripts/deploy/health-check.sh http://127.0.0.1:4000/api/v1/health/ready 10 2
          curl -fsS http://127.0.0.1:4000/api/v1/jobs/categories > /dev/null
          echo "API smoke tests passed"
          kill "$BACKEND_PID"

  # ── Admin frontend (frontend/) ─────────────────────────────────────────────
  admin-frontend:
    name: Admin frontend quality & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - name: TypeScript validation
        run: npx tsc --noEmit
      # No unit-test suite exists for the admin frontend; this job
      # deliberately does not claim one. Coverage comes from lint, type
      # checking, the production build, and the Playwright E2E job.
      - name: Production build
        run: npm run build

  # ── Jobs frontend (beleqet-jobs-nextjs/) ───────────────────────────────────
  jobs-frontend:
    name: Jobs frontend quality, tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beleqet-jobs-nextjs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: beleqet-jobs-nextjs/package-lock.json

      - run: npm ci
      - run: npm run lint
      - name: TypeScript validation
        run: npx tsc --noEmit
      # Vitest owns lib/__tests__/**/*.test.ts; Jest owns lib/**/*.spec.ts —
      # distinct suites by configuration, so both run without double-counting.
      - name: Vitest suite
        run: npm run test
      - name: Jest suite
        run: npm run test:unit -- --runInBand
      - name: Production build
        run: npm run build

  # ── Playwright end-to-end (BLOCKING — no continue-on-error) ────────────────
  playwright-e2e:
    name: Playwright E2E (blocking)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beleqet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Create synthetic test environment
        run: bash scripts/ci/create-test-env.sh .env
      - run: npm run prisma:generate
      - name: Apply database migrations
        run: npm run prisma:migrate:deploy
      - run: npm run build

      - name: Start backend and wait for readiness
        run: |
          node dist/main &
          bash scripts/deploy/health-check.sh http://127.0.0.1:4000/api/v1/health/ready 30 2

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --config frontend/playwright.config.ts --trace retain-on-failure

      - name: Upload Playwright report and traces on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ── Docker images: build, start the full stack, scan, publish on main ──────
  docker-build:
    name: Docker build, stack smoke test & scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image namespace
        id: meta
        run: echo "namespace=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: >-
          docker build -t "${{ steps.meta.outputs.namespace }}/beleqet-backend:${{ github.sha }}" .

      - name: Build admin frontend image
        run: >-
          docker build
          -t "${{ steps.meta.outputs.namespace }}/beleqet-admin-frontend:${{ github.sha }}"
          frontend

      - name: Build jobs frontend image
        run: >-
          docker build
          -t "${{ steps.meta.outputs.namespace }}/beleqet-jobs-frontend:${{ github.sha }}"
          beleqet-jobs-nextjs

      - name: Create synthetic staging environment
        run: |
          cat > .env.staging <<'EOF'
          STAGING_DB_USER=ci_smoke_user
          STAGING_DB_PASSWORD=ci_smoke_password
          STAGING_DB_NAME=ci_smoke_db
          STAGING_FRONTEND_URLS=http://localhost:3000,http://localhost:3001
          STAGING_APP_BASE_URL=http://localhost:4000
          JWT_ACCESS_SECRET=ci_smoke_jwt_secret_synthetic_0000000000000000000000000000000000
          SESSION_SECRET=ci_smoke_session_secret_synthetic
          TOTP_ENCRYPTION_KEY=abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
          TOTP_TEMP_SECRET=ci_smoke_totp_temp_secret_synthetic
          OAUTH_TOKEN_ENCRYPTION_KEY=VGVzdEVuY3J5cHRpb25LZXkzMkJ5dGVzTG9uZ1hZWjE=
          GOOGLE_CLIENT_ID=ci_smoke_google_client_id
          GOOGLE_CLIENT_SECRET=ci_smoke_google_client_secret
          GOOGLE_CALLBACK_URL=http://localhost:4000/api/v1/auth/google/callback
          LINKEDIN_CLIENT_ID=ci_smoke_linkedin_client_id
          LINKEDIN_CLIENT_SECRET=ci_smoke_linkedin_client_secret
          LINKEDIN_CALLBACK_URL=http://localhost:4000/api/v1/auth/linkedin/callback
          SMTP_HOST=localhost
          SMTP_PORT=2525
          SMTP_USER=ci_smoke_smtp_user
          SMTP_PASSWORD=ci_smoke_smtp_password
          SMTP_FROM_ADDRESS=noreply@example.test
          STRIPE_SECRET_KEY=sk_test_ci_smoke_synthetic
          STRIPE_WEBHOOK_SECRET=whsec_ci_smoke_synthetic
          PAYPAL_CLIENT_ID=ci_smoke_paypal_client_id
          PAYPAL_CLIENT_SECRET=ci_smoke_paypal_client_secret
          EOF
          cat > .env.images <<EOF
          BACKEND_IMAGE=${{ steps.meta.outputs.namespace }}/beleqet-backend:${{ github.sha }}
          ADMIN_IMAGE=${{ steps.meta.outputs.namespace }}/beleqet-admin-frontend:${{ github.sha }}
          JOBS_IMAGE=${{ steps.meta.outputs.namespace }}/beleqet-jobs-frontend:${{ github.sha }}
          EOF

      - name: Validate staging compose renders
        run: >-
          docker compose --env-file .env.staging --env-file .env.images
          -f docker-compose.staging.yml config > /dev/null

      - name: Start database and cache
        run: |
          docker compose --env-file .env.staging --env-file .env.images \
            -f docker-compose.staging.yml up -d --wait db redis

      - name: Apply migrations (single controlled step)
        run: |
          docker compose --env-file .env.staging --env-file .env.images \
            -f docker-compose.staging.yml run --rm --no-deps backend \
            npx prisma migrate deploy

      - name: Start full stack and verify every container becomes healthy
        run: |
          docker compose --env-file .env.staging --env-file .env.images \
            -f docker-compose.staging.yml up -d --wait
          bash scripts/deploy/health-check.sh http://127.0.0.1:4000/api/v1/health/ready 30 3
          bash scripts/deploy/health-check.sh http://127.0.0.1:3000/ 20 3
          bash scripts/deploy/health-check.sh http://127.0.0.1:3001/ 20 3

      - name: Collect stack logs on failure
        if: failure()
        run: |
          docker compose --env-file .env.staging --env-file .env.images \
            -f docker-compose.staging.yml ps || true
          docker compose --env-file .env.staging --env-file .env.images \
            -f docker-compose.staging.yml logs --tail 100 || true

      - name: Tear down smoke stack
        if: always()
        run: |
          docker compose --env-file .env.staging --env-file .env.images \
            -f docker-compose.staging.yml down -v || true

      - name: Scan images for critical vulnerabilities (trivy)
        run: |
          mkdir -p trivy-reports
          for svc in beleqet-backend beleqet-admin-frontend beleqet-jobs-frontend; do
            image="${{ steps.meta.outputs.namespace }}/${svc}:${{ github.sha }}"
            echo "trivy: $image"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$PWD/trivy-reports:/reports" \
              aquasec/trivy:0.58.1 image \
              --severity HIGH,CRITICAL --format table \
              --output "/reports/${svc}.txt" --exit-code 0 "$image"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.58.1 image \
              --severity CRITICAL --ignore-unfixed --exit-code 1 "$image"
          done

      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-image-reports
          path: trivy-reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Push SHA-tagged images to GHCR (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          for svc in beleqet-backend beleqet-admin-frontend beleqet-jobs-frontend; do
            docker push "${{ steps.meta.outputs.namespace }}/${svc}:${{ github.sha }}"
          done

  # ── Dependency security audit ──────────────────────────────────────────────
  security:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Gate: unresolved CRITICAL findings in production dependencies fail CI.
      # HIGH/moderate findings are reported in the logs for tracking (see
      # docs/CI_CD_AUDIT.md) without blocking unrelated changes.
      - name: Backend production dependency audit
        run: |
          npm audit --omit=dev || true
          npm audit --omit=dev --audit-level=critical

      - name: Admin frontend production dependency audit
        working-directory: frontend
        run: |
          npm audit --omit=dev || true
          npm audit --omit=dev --audit-level=critical

      - name: Jobs frontend production dependency audit
        working-directory: beleqet-jobs-nextjs
        run: |
          npm audit --omit=dev || true
          npm audit --omit=dev --audit-level=critical

  # ── Single aggregate gate for branch protection ────────────────────────────
  ci-success:
    name: CI success
    if: always()
    needs:
      - repo-validation
      - backend-quality
      - backend-unit
      - backend-integration
      - admin-frontend
      - jobs-frontend
      - playwright-e2e
      - docker-build
      - security
    runs-on: ubuntu-latest
    steps:
      - name: Verify every mandatory job succeeded
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          failed="$(echo "$NEEDS_JSON" | grep -Ec '"result": *"(failure|cancelled|skipped)"' || true)"
          if [ "$failed" != "0" ]; then
            echo "::error::$failed mandatory job(s) did not succeed"
            exit 1
          fi
          echo "All mandatory jobs succeeded"
