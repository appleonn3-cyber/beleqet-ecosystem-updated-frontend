# Beleqet Load Balancer — Nginx upstream configuration
# Addresses issue #41 (Performance & Network): traffic distribution, health checks,
# sticky sessions, and horizontal scaling without an in-app HTTP router.
#
# Default strategy: IP Hash (sticky sessions by client IP).
# Required for NestJS Socket.IO chat: long-polling handshake + WebSocket upgrade
# must stick to the same backend, otherwise clients get "Session ID unknown" (400).
#
# Alternative strategies (enable ONE approach at a time — disable ip_hash first):
#   - Round Robin   — remove `ip_hash;` (not safe for Socket.IO without sticky cookies)
#   - Least Conn    — remove `ip_hash;` and uncomment `least_conn;`
#
# Health checks:
#   Passive probes via max_fails + fail_timeout. Unhealthy backends are skipped
#   automatically; when they recover they re-enter the pool (failover).
#
# Multi-currency / region (global scaling):
#   X-Currency and X-Region headers are forwarded to backends unchanged.

# WebSocket: set Connection to "upgrade" only when the client requests it.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream beleqet_backend {
    # Sticky sessions by client IP (required for Socket.IO / chat)
    ip_hash;

    # Alternative: Least Connections (disable ip_hash above first)
    # least_conn;

    server backend-1:4000 max_fails=3 fail_timeout=30s;
    server backend-2:4000 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;

    # LB liveness (does not hit backends)
    location = /lb-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Socket.IO long-polling + WebSocket upgrade (chat module namespace /chat)
    location /socket.io/ {
        proxy_pass http://beleqet_backend;
        proxy_http_version 1.1;

        # Critical: allow HTTP → WebSocket protocol upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections for Socket.IO
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 5s;
        proxy_buffering off;

        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location / {
        proxy_pass http://beleqet_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade (also covers gateways not under /socket.io/)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Multi-currency & region routing headers
        proxy_set_header X-Currency $http_x_currency;
        proxy_set_header X-Region $http_x_region;
        proxy_set_header X-Session-Id $cookie_beleqet_session;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
